name: it_app
description: "I'll Do It - South African work and hustle platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Backend & Authentication
  supabase_flutter: ^1.10.0
  
  # Networking
  dio: ^5.3.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  
  # UI & Utilities
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  
  # Image Handling
  image_picker: ^1.0.0
  flutter_image_compress: ^1.1.0
  
  # Permissions
  permission_handler: ^11.4.0
  
  # Navigation
  go_router: ^12.0.0
  
  # Notifications
  flutter_local_notifications: ^16.1.0
  firebase_messaging: ^14.6.0
  
  # Utilities
  intl: ^0.19.0
  package_info_plus: ^5.0.0
  uuid: ^4.0.0
  equatable: ^2.0.5
  either_dart: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  freezed_annotation: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  # Uncomment and add assets here
  # assets:
  #   - assets/images/
  #   - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
